services:
  wa_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa_gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - API_KEY=${API_KEY}
      - SESSION_PATH=${SESSION_PATH:-/app/sessions}
      - SESSIONS=${SESSIONS:-default}
      - MAX_RECONNECT=${MAX_RECONNECT:-0}
      - MARK_ONLINE=${MARK_ONLINE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BAILEYS_LOG_LEVEL=${BAILEYS_LOG_LEVEL:-silent}
    volumes:
      - wa_sessions:/app/sessions
      - wa_logs:/app/logs
    networks:
      - web_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  web_network:
    name: web_network
    driver: bridge

volumes:
  wa_sessions:
    driver: local
  wa_logs:
    driver: local
