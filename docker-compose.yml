services:
  wa-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_KEY=${API_KEY}
      - SESSION_PATH=/app/sessions
      - MAX_RECONNECT=${MAX_RECONNECT:-5}
      - MARK_ONLINE=${MARK_ONLINE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BAILEYS_LOG_LEVEL=silent
    volumes:
      - wa_sessions:/app/sessions
      - wa_logs:/app/logs
    networks:
      - wa-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  wa-network:
    driver: bridge

volumes:
  wa_sessions:
    driver: local
  wa_logs:
    driver: local
